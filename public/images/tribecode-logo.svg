<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="50%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#0ea5e9"/>
    </linearGradient>
    
    <!-- Circuit pattern for 't' -->
    <pattern id="circuit-t" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <circle cx="10" cy="10" r="2" fill="#06b6d4"/>
      <path d="M10 0 L10 10 M10 10 L15 15 M10 10 L5 15" stroke="#06b6d4" stroke-width="1.5" fill="none"/>
    </pattern>
    
    <!-- Circuit pattern for 'o' -->
    <pattern id="circuit-o" x="0" y="0" width="15" height="15" patternUnits="userSpaceOnUse">
      <circle cx="7.5" cy="7.5" r="6" stroke="#06b6d4" stroke-width="1.5" fill="none"/>
      <circle cx="7.5" cy="7.5" r="2" fill="#06b6d4"/>
      <path d="M7.5 0 L7.5 5.5 M7.5 10 L7.5 15 M0 7.5 L5.5 7.5 M10 7.5 L15 7.5" stroke="#06b6d4" stroke-width="1.5"/>
    </pattern>
  </defs>
  
  <!-- Main text -->
  <text x="50" y="120" font-family="Arial, sans-serif" font-size="80" font-weight="900" fill="#0f172a">
    <tspan x="50" dy="0">t</tspan>
    <tspan x="90" dy="0" fill="url(#logoGradient)" style="filter: drop-shadow(0 0 3px rgba(14, 165, 233, 0.5));">r</tspan>
    <tspan x="140" dy="0">i</tspan>
    <tspan x="160" dy="0" fill="url(#logoGradient)" style="filter: drop-shadow(0 0 3px rgba(14, 165, 233, 0.5));">b</tspan>
    <tspan x="210" dy="0">e</tspan>
    <tspan x="260" dy="0" fill="url(#logoGradient)" style="filter: drop-shadow(0 0 3px rgba(14, 165, 233, 0.5));">c</tspan>
    <tspan x="310" dy="0">o</tspan>
    <tspan x="360" dy="0" fill="url(#logoGradient)" style="filter: drop-shadow(0 0 3px rgba(14, 165, 233, 0.5));">d</tspan>
    <tspan x="410" dy="0">e</tspan>
    <tspan x="460" dy="0" fill="url(#logoGradient)" style="filter: drop-shadow(0 0 3px rgba(14, 165, 233, 0.5));">AI</tspan>
  </text>
  
  <!-- Circuit board decorations -->
  <g stroke="#06b6d4" stroke-width="2" fill="none" opacity="0.6">
    <!-- Left side circuits -->
    <path d="M30 60 L30 40 L50 40"/>
    <circle cx="50" cy="40" r="3" fill="#06b6d4"/>
    <path d="M20 80 L40 80 L40 60"/>
    <circle cx="40" cy="60" r="2.5" fill="#06b6d4"/>
    
    <!-- Right side circuits -->
    <path d="M520 50 L540 50 L540 30"/>
    <circle cx="540" cy="30" r="3" fill="#06b6d4"/>
    <path d="M500 70 L520 70 L520 90"/>
    <circle cx="520" cy="90" r="2.5" fill="#06b6d4"/>
    
    <!-- Bottom circuits -->
    <path d="M100 150 L100 170 L120 170"/>
    <circle cx="120" cy="170" r="3" fill="#06b6d4"/>
    <path d="M450 150 L450 170 L430 170"/>
    <circle cx="430" cy="170" r="3" fill="#06b6d4"/>
  </g>
  
  <!-- Tagline -->
  <text x="400" y="165" font-family="Arial, sans-serif" font-size="18" font-weight="500" fill="#06b6d4" text-anchor="middle" letter-spacing="3">
    INTELLIGENT SOLUTIONS
  </text>
</svg>
