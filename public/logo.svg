<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 140">
  <defs>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="50%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ff6b35"/>
    </linearGradient>
    <linearGradient id="cyanGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0ea5e9"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Circuit node decorations left of 't' -->
  <g stroke="#0ea5e9" stroke-width="1.5" fill="none" opacity="0.7">
    <circle cx="22" cy="42" r="3" fill="#0ea5e9"/>
    <path d="M22 42 L22 60 M22 60 L14 68 M22 60 L30 68"/>
    <circle cx="14" cy="72" r="2" fill="#0ea5e9"/>
    <circle cx="30" cy="72" r="2" fill="#0ea5e9"/>
    <path d="M8 42 L22 42"/>
    <circle cx="8" cy="42" r="2" fill="#0ea5e9"/>
  </g>

  <!-- Main wordmark: tribe -->
  <text
    font-family="'Arial Black', Arial, sans-serif"
    font-size="72"
    font-weight="900"
    letter-spacing="-2"
    fill="white"
  >
    <tspan x="48" y="90">tribe</tspan>
  </text>

  <!-- code — accent gradient -->
  <text
    font-family="'Arial Black', Arial, sans-serif"
    font-size="72"
    font-weight="900"
    letter-spacing="-2"
    fill="url(#accentGrad)"
    filter="url(#glow)"
  >
    <tspan x="242" y="90">code</tspan>
  </text>

  <!-- AI — cyan -->
  <text
    font-family="'Arial Black', Arial, sans-serif"
    font-size="72"
    font-weight="900"
    letter-spacing="-2"
    fill="url(#cyanGrad)"
    filter="url(#glow)"
  >
    <tspan x="448" y="90">AI</tspan>
  </text>

  <!-- Circuit node decorations near 'AI' -->
  <g stroke="#0ea5e9" stroke-width="1.5" fill="none" opacity="0.7">
    <circle cx="576" cy="42" r="3" fill="#0ea5e9"/>
    <path d="M576 42 L576 62 M576 62 L566 72 M576 62 L586 72"/>
    <circle cx="566" cy="76" r="2" fill="#0ea5e9"/>
    <circle cx="586" cy="76" r="2" fill="#0ea5e9"/>
  </g>

  <!-- Tagline -->
  <text
    x="300"
    y="118"
    font-family="Arial, sans-serif"
    font-size="13"
    font-weight="500"
    fill="#64748b"
    text-anchor="middle"
    letter-spacing="4"
  >INTELLIGENT SOLUTIONS</text>
</svg>
